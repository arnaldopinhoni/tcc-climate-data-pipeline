version: 2

models:
  - name: silver_climate_hourly_history
    description: "Camada Silver historica - dados horarios preservados por rodada de ingestao, com rastreabilidade ate a Bronze."
    columns:
      - name: bronze_record_id
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: ingestion_time
        tests:
          - not_null
      - name: record_time
        tests:
          - not_null
      - name: et0_fao_evapotranspiration
        description: "Evapotranspiracao de referencia horaria disponibilizada pela Open-Meteo com base em FAO-56."

  - name: silver_climate_hourly
    description: "Camada Silver corrente - recorte da rodada mais recente por cidade, derivado do historico."
    columns:
      - name: bronze_record_id
        tests:
          - not_null
      - name: city
        tests:
          - not_null
      - name: ingestion_time
        tests:
          - not_null
      - name: record_time
        tests:
          - not_null
      - name: dew_point_2m
        description: "Ponto de orvalho a 2 m em graus Celsius."
      - name: shortwave_radiation
        description: "Radiacao solar de onda curta horaria em W/m2."
      - name: wind_speed_10m
        description: "Velocidade do vento a 10 m em km/h."
      - name: vapour_pressure_deficit
        description: "Deficit de pressao de vapor horario em kPa."
      - name: et0_fao_evapotranspiration
        description: "Evapotranspiracao de referencia horaria calculada pela Open-Meteo com base em FAO-56."

  - name: gold_daily_summary_history
    description: "Camada Gold historica - agregacao diaria por cidade e por rodada de ingestao."
    columns:
      - name: city
        tests:
          - not_null
      - name: bronze_record_id
        tests:
          - not_null
      - name: ingestion_time
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: total_et0_fao_evapotranspiration
        description: "Soma diaria da evapotranspiracao de referencia por cidade em cada rodada de ingestao."

  - name: gold_daily_summary
    description: "Camada Gold corrente - agregacao diaria da rodada mais recente por cidade."
    columns:
      - name: city
        tests:
          - not_null
      - name: bronze_record_id
        tests:
          - not_null
      - name: ingestion_time
        tests:
          - not_null
      - name: day
        tests:
          - not_null
      - name: total_et0_fao_evapotranspiration
        description: "Soma diaria da evapotranspiracao de referencia por cidade."
